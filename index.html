<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#1f6feb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="CopyStack — a speed puzzle game. Copy the card as fast as you can." />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <title>CopyStack</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1 class="title">CopyStack</h1>
        <div class="topbar-actions">
          <select id="difficulty" class="difficulty-select" aria-label="Difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
            <option value="insane">Insane</option>
          </select>
          <button id="best-btn" class="icon-btn" title="Best scores">★</button>
          <button id="new-game" class="text-btn">New game</button>
        </div>
      </header>

      <section class="stats" aria-label="Session stats">
        <div class="stat"><span class="stat-label">Time</span><span id="stat-time" class="stat-value">0.0</span></div>
        <div class="stat"><span class="stat-label">Moves</span><span id="stat-moves" class="stat-value">0</span></div>
        <div class="stat"><span class="stat-label">Cards</span><span id="stat-cards" class="stat-value">0</span></div>
        <div class="stat"><span class="stat-label">Best</span><span id="stat-best" class="stat-value">—</span></div>
        <div class="stat"><span class="stat-label">Score</span><span id="stat-score" class="stat-value">0</span></div>
      </section>

      <section class="card-area">
        <div class="card-flipper" id="card-flipper">
          <div class="card-face card-back">
            <span class="card-back-logo">CopyStack</span>
          </div>
          <div class="card-face card-front" id="card-front"></div>
        </div>
        <button id="start-btn" class="start-btn">Start</button>
      </section>

      <section class="board" id="board" aria-label="Game board"></section>

      <div class="overlay hidden" id="win-overlay">
        <div class="overlay-panel">
          <h2>Card complete!</h2>
          <p id="win-details"></p>
          <button id="win-next" class="start-btn">Next card</button>
        </div>
      </div>

      <div class="overlay hidden" id="best-overlay">
        <div class="overlay-panel">
          <h2>Best scores</h2>
          <div id="best-table"></div>
          <button id="best-close" class="text-btn">Close</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
